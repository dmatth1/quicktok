name: wheels
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  wheels:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # portable ABI (no -march=native); skip slow/legacy targets
          CIBW_SKIP: "pp* *-musllinux_i686 *_i686 *-win32"
          # self-contained smoke test — tiktoken parity is covered in the main CI;
          # the manylinux test container has no Rust to build tiktoken from source.
          CIBW_TEST_COMMAND: >
            python -c "import quicktok;
            enc=quicktok.get_encoding('o200k_base');
            s='wheel smoke: café 日本語 🚀 123';
            assert enc.decode(enc.encode(s))==s and enc.count(s)>0;
            assert quicktok.get_encoding('cl100k_base').n_vocab==100256;
            print('wheel OK')"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: pipx run build --sdist --outdir dist
      - uses: actions/upload-artifact@v4
        with: { name: sdist, path: dist/*.tar.gz }

  publish:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write          # PyPI Trusted Publishing (no API token in secrets)
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist }
