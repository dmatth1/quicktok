name: wheels
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  wheels:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # portable ABI (no -march=native); skip slow/legacy targets
          CIBW_SKIP: "pp* *-musllinux_i686 *_i686 *-win32"
          CIBW_TEST_REQUIRES: tiktoken
          CIBW_TEST_COMMAND: >
            python -c "import quicktok, tiktoken;
            qt=quicktok.get_encoding('o200k_base'); tk=tiktoken.get_encoding('o200k_base');
            s='parity check: café 日本語 🚀 123';
            assert qt.encode(s)==tk.encode_ordinary(s);
            assert qt.decode(qt.encode(s))==s; print('wheel OK')"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: pipx run build --sdist --outdir dist
      - uses: actions/upload-artifact@v4
        with: { name: sdist, path: dist/*.tar.gz }

  publish:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write          # PyPI Trusted Publishing (no API token in secrets)
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist }
