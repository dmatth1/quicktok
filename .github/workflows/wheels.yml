name: wheels
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  wheels:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # portable ABI (no -march=native); skip slow/legacy targets
          CIBW_SKIP: "pp* *-musllinux_i686 *_i686 *-win32"
          # test the actual built wheel with the hermetic part of the suite. No
          # tiktoken (the manylinux test container has no Rust to build it) — the
          # tiktoken-parity tests importorskip and are covered in the main CI; the
          # rest (round-trip, batch, module, importer contract) run per platform.
          CIBW_TEST_REQUIRES: pytest numpy
          CIBW_TEST_COMMAND: pytest {project}/tests -q
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: pipx run build --sdist --outdir dist
      - uses: actions/upload-artifact@v4
        with: { name: sdist, path: dist/*.tar.gz }

  publish:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write          # PyPI Trusted Publishing (no API token in secrets)
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist }
