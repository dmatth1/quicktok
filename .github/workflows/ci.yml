name: ci
on: [push, pull_request]
jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: build + test
        run: make test
      - name: example
        run: make example
      - name: bench (native, smoke)
        run: make bench
      - name: version consistency
        run: python3 tools/check_version.py
      - name: staged install
        run: make install DESTDIR=/tmp/stage && find /tmp/stage -type f
  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: ASan + UBSan test
        run: |
          c++ -O1 -g -std=c++20 -march=native -fsanitize=address,undefined -fno-sanitize-recover=all \
              -Iinclude -Isrc test/test_quicktok.cpp src/quicktok.cpp src/trie2_mb.cpp -o san_test
          ./san_test data

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: fuzz smoke (30s)
        run: |
          clang++ -O1 -g -std=c++20 -fsanitize=fuzzer,address,undefined -fno-sanitize-recover=all \
            -Iinclude -Isrc test/fuzz_quicktok.cpp src/quicktok.cpp src/trie2_mb.cpp -o fuzz
          ./fuzz -max_total_time=30 -rss_limit_mb=4096

  python-tests:
    name: python ${{ matrix.python }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: "3.9" }
          - { os: ubuntu-latest, python: "3.13" }
          - { os: macos-latest,  python: "3.13" }
          - { os: windows-latest, python: "3.13" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"
      - name: install (with test extras) + run the Python API suite
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
          python -m pytest tests/ -q

  cmake-test:
    name: cmake+ctest ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: configure + build + ctest
        run: |
          cmake -S . -B build -DQUICKTOK_BUILD_TESTS=ON
          cmake --build build --config Release -j 4
          ctest --test-dir build -C Release --output-on-failure
      - name: install + find_package consumer    # audit gap #5
        shell: bash
        run: |
          cmake --install build --config Release --prefix "$PWD/_install"
          cmake -S tests/consumer -B _cons -DCMAKE_PREFIX_PATH="$PWD/_install"
          cmake --build _cons --config Release -j 4
          # find the built consumer exe (layout differs per generator) and run it
          exe=$(find _cons -name 'consumer' -o -name 'consumer.exe' | head -1)
          "$exe" "$PWD/_install/share/quicktok"

  data-provenance:
    name: data files match their source-of-truth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.14" }   # UCD 16.0.0, matching the committed nfc.bin
      - name: verify bundled data is reproducible from the reference
        run: |
          python -m pip install --upgrade pip
          pip install "regex==2026.5.9" tiktoken   # versions recorded in data/*.meta
          # exhaustive: committed Unicode/NFC tables == live reference engine
          python tools/export_unicode.py verify
          python tools/export_unicode_o200k.py verify
          python tools/export_nfc.py verify
          # vocabs == tiktoken (byte-compare committed files to the source ranks)
          python tools/check_vocab_provenance.py

  coverage:
    name: C++ coverage of src/ (informational)
    runs-on: ubuntu-latest
    continue-on-error: true          # informational — reports, never gates CI
    steps:
      - uses: actions/checkout@v5
      - name: build with clang coverage, run the vector suite, report src/ coverage
        run: |
          sudo apt-get update && sudo apt-get install -y clang-18 llvm-18
          clang++-18 -O0 -g -std=c++20 -fprofile-instr-generate -fcoverage-mapping \
            -Iinclude -Isrc test/test_quicktok.cpp src/quicktok.cpp src/trie2_mb.cpp -o covtest
          LLVM_PROFILE_FILE=cov.profraw ./covtest data
          llvm-profdata-18 merge -sparse cov.profraw -o cov.profdata
          echo "=== src/ coverage (does the vector suite reach backtracking / whitespace alts / wide memo?) ==="
          llvm-cov-18 report ./covtest -instr-profile=cov.profdata $(ls src/*.cpp src/*.hpp)
