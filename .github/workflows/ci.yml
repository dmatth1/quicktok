name: ci
on: [push, pull_request]
jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: build + test
        run: make test
      - name: example
        run: make example
      - name: bench (native, smoke)
        run: make bench
      - name: version consistency
        run: python3 tools/check_version.py
      - name: staged install
        run: make install DESTDIR=/tmp/stage && find /tmp/stage -type f
  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: ASan + UBSan test
        run: |
          c++ -O1 -g -std=c++20 -march=native -fsanitize=address,undefined -fno-sanitize-recover=all \
              -Iinclude -Isrc test/test_quicktok.cpp src/quicktok.cpp src/trie2_mb.cpp -o san_test
          ./san_test data

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: fuzz smoke (30s)
        run: |
          clang++ -O1 -g -std=c++20 -fsanitize=fuzzer,address,undefined -fno-sanitize-recover=all \
            -Iinclude -Isrc test/fuzz_quicktok.cpp src/quicktok.cpp src/trie2_mb.cpp -o fuzz
          ./fuzz -max_total_time=30 -rss_limit_mb=4096

  python-tests:
    name: python ${{ matrix.python }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: "3.9" }
          - { os: ubuntu-latest, python: "3.13" }
          - { os: macos-latest,  python: "3.13" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"
      - name: install (with test extras) + run the Python API suite
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
          python -m pytest tests/ -q
