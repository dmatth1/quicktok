name: ci
on: [push, pull_request]
jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: build + test
        run: make test
      - name: example
        run: make example
      - name: bench (native, smoke)
        run: make bench
      - name: staged install
        run: make install DESTDIR=/tmp/stage && find /tmp/stage -type f
  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ASan + UBSan test
        run: |
          c++ -O1 -g -std=c++20 -march=native -fsanitize=address,undefined -fno-sanitize-recover=all \
              -Iinclude -Isrc test/test_quicktok.cpp src/quicktok.cpp src/trie2_mb.cpp -o san_test
          ./san_test data
